app = "notestack"
primary_region = "lax"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DATA_DIR = "/app/server/data"

[[mounts]]
  source = "brains_data"
  destination = "/app/server/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
